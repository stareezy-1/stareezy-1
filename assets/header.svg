<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="220" viewBox="0 0 1200 220" fill="none" role="img" aria-label="STAREEZY — Front End Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f0f"/>
      <stop offset="55%" stop-color="#0d2f27"/>
      <stop offset="100%" stop-color="#14b88a"/>
    </linearGradient>
    <linearGradient id="text" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#2DD4A7"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="220" fill="url(#bg)"/>

  <!-- animated waves -->
  <g opacity="0.35">
    <path fill="#2DD4A7" opacity="0.4" d="M0 160 Q150 120 300 160 T600 160 T900 160 T1200 160 V220 H0 Z">
      <animate attributeName="d"
        values="M0 160 Q150 120 300 160 T600 160 T900 160 T1200 160 V220 H0 Z;
                 M0 160 Q150 200 300 160 T600 160 T900 160 T1200 160 V220 H0 Z;
                 M0 160 Q150 120 300 160 T600 160 T900 160 T1200 160 V220 H0 Z"
        dur="6s" repeatCount="indefinite"/>
    </path>
    <path fill="#14b88a" opacity="0.5" d="M0 180 Q200 150 400 180 T800 180 T1200 180 V220 H0 Z">
      <animate attributeName="d"
        values="M0 180 Q200 150 400 180 T800 180 T1200 180 V220 H0 Z;
                 M0 180 Q200 210 400 180 T800 180 T1200 180 V220 H0 Z;
                 M0 180 Q200 150 400 180 T800 180 T1200 180 V220 H0 Z"
        dur="8s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- title -->
  <text x="600" y="100" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="72" font-weight="800" letter-spacing="6" fill="url(#text)" filter="url(#soft)">
    STAREEZY
    <animate attributeName="opacity" values="0;1" dur="1.2s" fill="freeze"/>
  </text>

  <!-- subtitle -->
  <text x="600" y="140" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="20" font-weight="500" letter-spacing="2" fill="#c9f5e9">
    Front End Engineer  ·  ERP &amp; Business Systems  ·  Web &amp; React Native
    <animate attributeName="opacity" values="0;0;1" dur="2s" fill="freeze"/>
  </text>
</svg>
